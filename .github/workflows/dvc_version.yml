name: DVC version new batch

on:
  push:
    paths:
      - 'production_batches/*.csv'

jobs:
  dvc-add:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install DVC
        run: pip install dvc

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: DVC init if needed
        run: |
          if [ ! -f .dvc/config ]; then
            dvc init
            git add .dvc
            git commit -m "chore: init DVC"
          fi

      - name: Configure DagsHub remote
        run: |
          dvc remote add -d dagshub https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/MLOps_Final.dvc
          dvc remote modify dagshub --local auth basic
          dvc remote modify dagshub --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify dagshub --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: DVC add new batches
        run: |
          dvc config core.autostage true
          for f in production_batches/*.csv; do
            git rm --cached "$f" 2>/dev/null || true
            dvc add "$f"
          done
          git add production_batches/
          git commit -m "dvc: version new batch" || echo "Nothing to commit"
          git push

      - name: DVC push to DagsHub
        run: dvc push